name: Docker Image CI

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  schedule:
    - cron: '35 5 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  HOST_PORT: 8080
  DOCKER_PORT: 80
jobs:

  rebuild-tags:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Trigger workflow for all tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags
          for tag in $(git tag); do
            echo "Triggering build for $tag..."
            gh workflow run docker-image.yml --ref "$tag"
          done

  integration-tests:
    uses: ./.github/workflows/integration-tests.yml

  build:
    needs: integration-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:

    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: sfuhrm/docker-nginx-webdav

    - name: Build and push Docker image
      id: push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6,linux/ppc64le,linux/s390x,linux/386,linux/riscv64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Install cosign
      uses: sigstore/cosign-installer@v3

    - name: Get image digest
      run: |
        echo "${{ steps.meta.outputs.tags }}" | tr ' ' '\n' | while read tag; do
          digest=$(docker manifest inspect "$tag" | jq -r '.manifests[0].digest')
          echo "Signing $tag@$digest"
          cosign sign --recursive "$tag@$digest" --yes
        done
